<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    body{
        margin:0px;
    }

    input {
      padding: 10px;
      border-radius: 4px;
      border-width: 2px;
      border-style: solid;
      margin: 6px;
      
    }

    button {
      padding-left: 18px;
      padding-right: 18px;
      padding-bottom: 10px;
      padding-top: 10px;
      font-family: Arial, Helvetica, sans-serif;
      border-radius: 4px;
      border-width: 0px;
      background-color: rgb(108, 59, 6);
      color: white;
      margin: 2px;
    }
    button:hover {
      background-color: #4d0a0a;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .background-of-web{
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #7b4e4e;
      background-size: cover;
      height: 100vh;
    }
  </style>
  <body>
    <div class="background-of-web"> 
      <div class="container-1">
        <h1 style="text-align: center">Login</h1>
        <form>
          <input type="email" name="" id="" placeholder="Email" />
          <input type="password" name="" id="" placeholder="Password" />
          <button>Login</button>
        </form>
      </div>
    </div>
  </body>
</html>
