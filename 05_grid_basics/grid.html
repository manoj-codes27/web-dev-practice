<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid basics</title>
</head>
<style>
    .grid-container{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;/*divides into fractions*/
        grid-template-rows:100px 200px 200px;
    }
    .item{
        background-color: blue;
        color:aliceblue;;
        font-weight:bold;
        border:1px solid white;
    }
    .item1{
        grid-column: 1/2;
        grid-row: 1/2;                

    }
    .item2{
        grid-column: 2/4;
        grid-row: 1/2;                

    }
    .item4{
        grid-column: 3/4;
        grid-row:2/5;
                      
    }
    .item3{
        grid-column: 1/3;
        grid-row:2/3;                

    }
    .item5{
        grid-column: 1/3;
        grid-row:3/4;
    }
</style>
<body>
    <h1 style="color: brown;">RANDOM DESIGN COMES IN MY MIND</h1>
        <div class="grid-container">
          <div class="item item1">1</div>
          <div class="item item2">2</div>
          <div class="item item3">3</div>
          <div class="item item4">4</div>
          <div class="item item5">5</div>
        </div>
</body>
</html>
